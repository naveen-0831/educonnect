{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-wrapper animate-up" style="padding: 1rem;">
    <div class="auth-card" style="max-width: 600px;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div
                style="width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, var(--indigo-600), var(--emerald-500)); display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 1.5rem;">
                🎓
            </div>
            <h2 style="margin-bottom: 0.5rem;">Join EduConnect</h2>
            <p style="color: var(--text-secondary); margin-bottom: 0;">Create your smart learning profile to get
                started.</p>
        </div>

        <form method="POST" action="{{ url_for('register') }}">
            <div class="grid-2">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" name="name" id="register-name" placeholder="Your full name"
                        required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" name="email" id="register-email"
                        placeholder="you@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" id="register-password"
                    placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label class="form-label">Preferred Subjects (Comma-separated)</label>
                <input type="text" class="form-control" name="subjects" id="register-subjects"
                    placeholder="e.g. Math, Physics, Computer Science">
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label class="form-label">Skill Level</label>
                    <select class="form-control" name="skill_level" id="register-skill">
                        <option value="Beginner">Beginner</option>
                        <option value="Intermediate">Intermediate</option>
                        <option value="Advanced">Advanced</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Availability</label>
                    <select class="form-control" name="availability" id="register-availability">
                        <option value="Weekends">Weekends</option>
                        <option value="Evenings">Evenings</option>
                        <option value="Anytime">Anytime</option>
                        <option value="Weekdays">Weekdays</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="register-submit"
                style="width: 100%; margin-top: 0.5rem; padding: 0.875rem;">
                Create Account ✨
            </button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
            Already have an account? <a href="{{ url_for('login') }}" style="font-weight: 600;">Log In</a>
        </p>
    </div>
</div>
{% endblock %}
