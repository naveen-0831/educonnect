{% extends "base.html" %}
{% block title %}My Profile{% endblock %}

{% block content %}
<div class="animate-up" style="max-width: 800px; margin: 2rem auto;">
    <div class="card">
        <h2
            style="display: flex; align-items: center; gap: 0.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1.5rem;">
            Update Your Profile
        </h2>

        <form method="POST" action="{{ url_for('profile') }}">
            <div class="form-group">
                <label class="form-label">Subjects of Interest (Comma-separated)</label>
                <input type="text" class="form-control" name="subjects" value="{{ user.subjects }}">
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label class="form-label">Skill Level</label>
                    <select class="form-control" name="skill_level">
                        <option value="Beginner" {% if user.skill_level=='Beginner' %}selected{% endif %}>Beginner
                        </option>
                        <option value="Intermediate" {% if user.skill_level=='Intermediate' %}selected{% endif %}>
                            Intermediate</option>
                        <option value="Advanced" {% if user.skill_level=='Advanced' %}selected{% endif %}>Advanced
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">General Availability</label>
                    <select class="form-control" name="availability">
                        <option value="Weekends" {% if user.availability=='Weekends' %}selected{% endif %}>Weekends
                        </option>
                        <option value="Evenings" {% if user.availability=='Evenings' %}selected{% endif %}>Evenings
                        </option>
                        <option value="Anytime" {% if user.availability=='Anytime' %}selected{% endif %}>Anytime
                        </option>
                        <option value="Weekdays" {% if user.availability=='Weekdays' %}selected{% endif %}>Weekdays
                        </option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Learning Goals & Description</label>
                <textarea class="form-control" name="learning_goals" rows="4">{{ user.learning_goals }}</textarea>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 2rem 0;">

            <div style="display: flex; justify-content: flex-end;">
                <button type="submit" class="btn btn-primary">Save Profile Setup</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
