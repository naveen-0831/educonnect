{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-wrapper animate-up">
    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div
                style="width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, var(--indigo-600), var(--teal-500)); display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 1.5rem;">
                👋
            </div>
            <h2 style="margin-bottom: 0.5rem;">Welcome Back</h2>
            <p style="color: var(--text-secondary); margin-bottom: 0;">Log in to access your dashboard and study groups.
            </p>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" name="email" id="login-email" placeholder="you@example.com"
                    required>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" name="password" id="login-password" placeholder="••••••••"
                    required>
            </div>

            <button type="submit" class="btn btn-primary" id="login-submit"
                style="width: 100%; margin-top: 0.5rem; padding: 0.875rem;">
                Log In →
            </button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? <a href="{{ url_for('register') }}" style="font-weight: 600;">Sign Up</a>
        </p>
    </div>
</div>
{% endblock %}
