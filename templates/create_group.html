{% extends "base.html" %}
{% block title %}Create Group{% endblock %}

{% block content %}
<div class="animate-up" style="max-width: 600px; margin: 2rem auto;">
    <div class="card">
        <h2
            style="display: flex; align-items: center; gap: 0.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1.5rem;">
            Create Study Group
        </h2>

        <form method="POST" action="{{ url_for('create_group') }}">
            <div class="form-group">
                <label class="form-label">Group Name</label>
                <input type="text" class="form-control" name="name" required
                    placeholder="e.g. Advanced Calculus Ninjas">
            </div>

            <div class="form-group">
                <label class="form-label">Subject Category</label>
                <input type="text" class="form-control" name="subject" required placeholder="e.g. Mathematics">
            </div>

            <div class="form-group">
                <label class="form-label">Group Description</label>
                <textarea class="form-control" name="description" rows="4" required
                    placeholder="Explain what this group focuses on and who should join..."></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Default Meeting Time</label>
                <input type="text" class="form-control" name="meeting_time" placeholder="e.g. Saturdays at 4 PM">
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 2rem 0;">

            <div style="display: flex; justify-content: space-between;">
                <a href="{{ url_for('groups') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Create Group</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
